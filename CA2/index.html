<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D Solar System · Tracking Camera & Pluto</title>
  <link rel="stylesheet" href="style1.css">
    
</head>
    
<body>
     <nav>
   
    <a href="infosheet.html"> Info Sheet </a>
         
    </nav>
  <div id="info-panel">
    <div class="planet-name" id="pname">Earth</div>
    <div class="planet-type" id="ptype">Terrestrial</div>
    <div class="info-row"><span class="info-label">Size vs Earth</span> <span id="psize">1.00×</span></div>
    <div class="info-row"><span class="info-label">Distance from Sun</span> <span id="pdist">1.0 AU</span></div>
    <div class="info-row"><span class="info-label">Avg Temperature</span> <span id="ptemp">15°C</span></div>
    <div class="temp-bar-container" id="tempBarContainer">
      <div class="temp-marker" id="tempMarker" style="left:50%;"></div>
    </div>
    <div class="temp-labels">
      <span>-250°C</span><span>0°C</span><span>250°C</span><span>500°C</span>
    </div>
  </div>
  <div class="instruction">🪐 Drag to rotate · Scroll to zoom · Click planet to track</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ─────────────────────────────────────
    // PLANET DATA – True scale orbits (Earth = 10 units), Pluto included
    // ─────────────────────────────────────
    const EARTH_ORBIT_BASE = 10;
    const AUScale = EARTH_ORBIT_BASE;

    const planetsData = [
      { name: 'Mercury', type: 'Terrestrial', color: '#b0b0b8', sizeRatio: 0.383, distanceAu: 0.39, tempMin: -180, tempMax: 430, tempAvg: 167, orbitRadius: 0.39 * AUScale, moond: 0 },
      { name: 'Venus', type: 'Terrestrial', color: '#e8cda0', sizeRatio: 0.949, distanceAu: 0.72, tempMin: 438, tempMax: 482, tempAvg: 462, orbitRadius: 0.72 * AUScale, moond: 0 },
      { name: 'Earth', type: 'Terrestrial', color: '#5599dd', sizeRatio: 1.0, distanceAu: 1.0, tempMin: -89, tempMax: 57, tempAvg: 15, orbitRadius: 1.0 * AUScale, moond: 1 },
      { name: 'Mars', type: 'Terrestrial', color: '#d45a3a', sizeRatio: 0.532, distanceAu: 1.52, tempMin: -140, tempMax: 20, tempAvg: -65, orbitRadius: 1.52 * AUScale, moond: 2 },
      { name: 'Jupiter', type: 'Gas Giant', color: '#d4b896', sizeRatio: 11.21, distanceAu: 5.2, tempMin: -160, tempMax: -100, tempAvg: -145, orbitRadius: 5.2 * AUScale, moond: 95, hasRing: false },
      { name: 'Saturn', type: 'Gas Giant', color: '#e8d5a3', sizeRatio: 9.45, distanceAu: 9.58, tempMin: -190, tempMax: -160, tempAvg: -178, orbitRadius: 9.58 * AUScale, moond: 146, hasRing: true },
      { name: 'Uranus', type: 'Ice Giant', color: '#8cc8e8', sizeRatio: 4.01, distanceAu: 19.2, tempMin: -226, tempMax: -197, tempAvg: -224, orbitRadius: 19.2 * AUScale, moond: 28 },
      { name: 'Neptune', type: 'Ice Giant', color: '#3355cc', sizeRatio: 3.88, distanceAu: 30.05, tempMin: -221, tempMax: -200, tempAvg: -218, orbitRadius: 30.05 * AUScale, moond: 16 },
      { name: 'Pluto', type: 'Dwarf Planet', color: '#cdb38c', sizeRatio: 0.18, distanceAu: 39.5, tempMin: -240, tempMax: -218, tempAvg: -229, orbitRadius: 39.5 * AUScale, moond: 5 }
    ];

    const EARTH_BASE_RADIUS = 0.8;
    const SUN_RADIUS = 3.2;
    const globalTempMin = -250;
    const globalTempMax = 500;
    const tempRange = globalTempMax - globalTempMin;

    // ─────────────────────────────────────
    // SCENE SETUP
    // ─────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020010);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1500);
    camera.position.set(90, 60, 140);
    camera.lookAt(0, 0, 0);

    // WebGL Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // CSS2 Renderer for labels
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.3;
    controls.zoomSpeed = 1.5;
    controls.panSpeed = 0.7;
    controls.target.set(0, 0, 0);
    controls.maxDistance = 700;
    controls.minDistance = 3;
    controls.update();

    // ─────────────────────────────────────
    // LIGHTING
    // ─────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x404066);
    scene.add(ambientLight);
    
    const sunLight = new THREE.PointLight(0xffeedd, 2.5, 0, 0);
    sunLight.position.set(0, 0, 0);
    sunLight.castShadow = true;
    sunLight.receiveShadow = true;
    sunLight.shadow.mapSize.width = 1024;
    sunLight.shadow.mapSize.height = 1024;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 800;
    scene.add(sunLight);

    // ─────────────────────────────────────
    // STARFIELD
    // ─────────────────────────────────────
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 3000;
    const starsPositions = new Float32Array(starsCount * 3);
    const starfieldRadius = 500;
    for (let i = 0; i < starsCount * 3; i += 3) {
      const r = starfieldRadius * (0.8 + Math.random() * 0.5);
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.asin((Math.random() * 2) - 1);
      starsPositions[i] = Math.cos(theta) * Math.cos(phi) * r;
      starsPositions[i+1] = Math.sin(phi) * r;
      starsPositions[i+2] = Math.sin(theta) * Math.cos(phi) * r;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, blending: THREE.AdditiveBlending });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // ─────────────────────────────────────
    // SUN
    // ─────────────────────────────────────
    const sunGeometry = new THREE.SphereGeometry(SUN_RADIUS, 64, 64);
    const sunMaterial = new THREE.MeshStandardMaterial({
      color: 0xffaa00,
      emissive: new THREE.Color(0xff5500),
      roughness: 0.5,
    });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    sun.castShadow = false;
    sun.receiveShadow = false;
    scene.add(sun);
    
    const sunGlowGeometry = new THREE.SphereGeometry(SUN_RADIUS * 1.08, 32, 32);
    const sunGlowMaterial = new THREE.MeshBasicMaterial({
      color: 0xff6600,
      transparent: true,
      opacity: 0.2,
      blending: THREE.AdditiveBlending
    });
    const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
    scene.add(sunGlow);

    const sunDiv = document.createElement('div');
    sunDiv.textContent = '☀ Sun';
    sunDiv.style.color = '#ffaa00';
    sunDiv.style.fontWeight = 'bold';
    sunDiv.style.fontSize = '14px';
    sunDiv.style.textShadow = '0 0 12px #ff6600';
    const sunLabel = new CSS2DObject(sunDiv);
    sunLabel.position.set(0, SUN_RADIUS + 0.8, 0);
    sun.add(sunLabel);

    // ─────────────────────────────────────
    // CREATE PLANETS & ORBITS
    // ─────────────────────────────────────
    const planets = [];
    const orbitLines = [];

    planetsData.forEach((data) => {
      const radius = data.orbitRadius;
      const segments = 256;
      const orbitPoints = [];
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        orbitPoints.push(new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius));
      }
      const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
      const orbitMaterial = new THREE.LineBasicMaterial({ 
        color: new THREE.Color(data.color).multiplyScalar(0.5), 
        opacity: 0.22, 
        transparent: true 
      });
      const orbitLine = new THREE.LineLoop(orbitGeometry, orbitMaterial);
      scene.add(orbitLine);
      orbitLines.push(orbitLine);

      const planetRadius = Math.max(0.08, data.sizeRatio * EARTH_BASE_RADIUS);
      const geometry = new THREE.SphereGeometry(planetRadius, 48, 48);
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(100, 80, planetRadius * 10, 128, 128, 200);
      gradient.addColorStop(0, data.color);
      gradient.addColorStop(0.7, new THREE.Color(data.color).multiplyScalar(0.6).getStyle());
      gradient.addColorStop(1, '#111122');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 256, 256);
      const texture = new THREE.CanvasTexture(canvas);
      
      const material = new THREE.MeshStandardMaterial({
        map: texture,
        roughness: 0.7,
        metalness: 0.1,
      });
      const planet = new THREE.Mesh(geometry, material);
      planet.castShadow = true;
      planet.receiveShadow = true;
      planet.userData = {
        data: data,
        planetRadius: planetRadius,
        orbitRadius: radius,
        angle: Math.random() * Math.PI * 2,
        speed: 0.15 + Math.random() * 0.2,
        color: data.color,
        name: data.name
      };
      
      planet.position.x = Math.cos(planet.userData.angle) * radius;
      planet.position.z = Math.sin(planet.userData.angle) * radius;
      scene.add(planet);
      
      if (data.hasRing) {
        const ringGeometry = new THREE.RingGeometry(planetRadius * 1.5, planetRadius * 2.2, 64);
        const ringMaterial = new THREE.MeshStandardMaterial({
          color: 0xc8b070,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.4,
          roughness: 0.7
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2 + 0.1;
        ring.castShadow = false;
        ring.receiveShadow = false;
        planet.add(ring);
      }
      
      const div = document.createElement('div');
      div.textContent = data.name;
      div.style.color = '#ffffff';
      div.style.fontSize = '12px';
      div.style.fontWeight = 'bold';
      div.style.textShadow = '0 0 8px black';
      div.style.background = 'rgba(0,0,0,0.5)';
      div.style.padding = '2px 8px';
      div.style.borderRadius = '12px';
      const label = new CSS2DObject(div);
      label.position.set(0, planetRadius + 0.5, 0);
      planet.add(label);
      
      planets.push(planet);
    });

    // ─────────────────────────────────────
    // UI PANEL & TRACKING LOGIC
    // ─────────────────────────────────────
    const infoPanel = document.getElementById('info-panel');
    const pnameEl = document.getElementById('pname');
    const ptypeEl = document.getElementById('ptype');
    const psizeEl = document.getElementById('psize');
    const pdistEl = document.getElementById('pdist');
    const ptempEl = document.getElementById('ptemp');
    const tempMarker = document.getElementById('tempMarker');

    let selectedPlanet = null;
    let hoveredPlanet = null;

    function updateInfoPanel(data) {
      if (!data) {
        infoPanel.classList.remove('visible');
        return;
      }
      pnameEl.textContent = data.name;
      pnameEl.style.color = data.color;
      ptypeEl.textContent = data.type + (data.moond ? ` · ${data.moond} moons` : '');
      psizeEl.textContent = `${data.sizeRatio.toFixed(2)}× Earth`;
      pdistEl.textContent = `${data.distanceAu} AU`;
      ptempEl.textContent = `${data.tempAvg}°C`;
      
      const avgPercent = ((data.tempAvg - globalTempMin) / tempRange) * 100;
      tempMarker.style.left = `${Math.min(100, Math.max(0, avgPercent))}%`;
      
      infoPanel.classList.add('visible');
    }

    function hideInfoPanel() {
      infoPanel.classList.remove('visible');
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onMouseMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(planets);
      
      if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (hoveredPlanet !== obj) {
          if (hoveredPlanet) hoveredPlanet.material.emissive?.setHex(0x000000);
          hoveredPlanet = obj;
          obj.material.emissive = new THREE.Color(0x333333);
          updateInfoPanel(obj.userData.data);
        }
      } else {
        if (hoveredPlanet) {
          hoveredPlanet.material.emissive?.setHex(0x000000);
          hoveredPlanet = null;
        }
        if (!selectedPlanet) hideInfoPanel();
      }
    }

    function onClick(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(planets);
      
      if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (selectedPlanet && selectedPlanet !== obj) {
          selectedPlanet.material.emissive?.setHex(0x000000);
        }
        selectedPlanet = obj;
        obj.material.emissive = new THREE.Color(0x444444);
        updateInfoPanel(obj.userData.data);
        
        // Set target to planet and adjust camera offset
        controls.target.copy(obj.position);
        const offset = new THREE.Vector3().subVectors(camera.position, controls.target).normalize().multiplyScalar(8);
        camera.position.copy(obj.position.clone().add(offset));
        controls.update();
      } else {
        if (selectedPlanet) {
          selectedPlanet.material.emissive?.setHex(0x000000);
          selectedPlanet = null;
        }
        hideInfoPanel();
        controls.target.set(0, 0, 0);
      }
    }

    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('click', onClick);
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        const touch = e.touches[0];
        onMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
      }
    });
    window.addEventListener('touchend', (e) => {
      if (e.changedTouches.length === 1) {
        const touch = e.changedTouches[0];
        onClick({ clientX: touch.clientX, clientY: touch.clientY });
      }
    });

    // ─────────────────────────────────────
    // ANIMATION LOOP WITH TRACKING
    // ─────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      
      // Update planet positions
      planets.forEach(planet => {
        planet.userData.angle += planet.userData.speed * 0.008;
        const r = planet.userData.orbitRadius;
        planet.position.x = Math.cos(planet.userData.angle) * r;
        planet.position.z = Math.sin(planet.userData.angle) * r;
        planet.rotation.y += 0.005;
      });
      
      // Track selected planet: keep controls target locked on it
      if (selectedPlanet) {
        controls.target.copy(selectedPlanet.position);
      }
      
      stars.rotation.y += 0.00005;
      
      controls.update();
      
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Initial Earth selection
    setTimeout(() => {
      const earthPlanet = planets.find(p => p.userData.data.name === 'Earth');
      if (earthPlanet) {
        selectedPlanet = earthPlanet;
        earthPlanet.material.emissive = new THREE.Color(0x444444);
        updateInfoPanel(earthPlanet.userData.data);
        controls.target.copy(earthPlanet.position);
        controls.update();
      }
    }, 200);

    console.log('🌌 3D Solar System ready! Click any planet – camera will follow it.');
  </script>
</body>
</html>
